<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#94a3b8" font-size="11">MCP DOCUMENT SERVER — ARCHITECTURE</text>

  <!-- AI Clients (left) -->
  <rect x="30" y="60" width="180" height="180" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="120" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">MCP CLIENTS</text>
  <rect x="45" y="95" width="150" height="28" rx="4" fill="#334155"/>
  <text x="120" y="114" text-anchor="middle" fill="#f1f5f9" font-size="11">Claude / Kiro</text>
  <rect x="45" y="130" width="150" height="28" rx="4" fill="#334155"/>
  <text x="120" y="149" text-anchor="middle" fill="#f1f5f9" font-size="11">Cursor / Codex</text>
  <rect x="45" y="165" width="150" height="28" rx="4" fill="#334155"/>
  <text x="120" y="184" text-anchor="middle" fill="#f1f5f9" font-size="11">Windsurf / Open Code</text>
  <rect x="45" y="200" width="150" height="28" rx="4" fill="#334155"/>
  <text x="120" y="219" text-anchor="middle" fill="#f1f5f9" font-size="11">Any MCP Client</text>

  <!-- Arrow: Clients → Server -->
  <line x1="210" y1="150" x2="280" y2="150" stroke="#6366f1" stroke-width="2"/>
  <polygon points="280,145 290,150 280,155" fill="#6366f1"/>
  <text x="250" y="140" text-anchor="middle" fill="#6366f1" font-size="9">JSON-RPC</text>
  <text x="250" y="162" text-anchor="middle" fill="#6366f1" font-size="9">stdio</text>

  <!-- MCP Server (center) -->
  <rect x="290" y="50" width="280" height="260" rx="8" fill="url(#mcpGrad)" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="72" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold">mcp-document (Rust)</text>

  <!-- Server internals -->
  <rect x="305" y="85" width="250" height="35" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="0.5"/>
  <text x="430" y="107" text-anchor="middle" fill="#f1f5f9" font-size="11">rmcp 1.7 — #[tool_router] (29 tools)</text>

  <rect x="305" y="128" width="120" height="30" rx="4" fill="#1e293b"/>
  <text x="365" y="147" text-anchor="middle" fill="#fbbf24" font-size="10">HealthCheck</text>

  <rect x="435" y="128" width="120" height="30" rx="4" fill="#1e293b"/>
  <text x="495" y="147" text-anchor="middle" fill="#fbbf24" font-size="10">mcp-server.toml</text>

  <!-- Tool categories -->
  <rect x="305" y="168" width="80" height="50" rx="4" fill="#1e293b"/>
  <text x="345" y="186" text-anchor="middle" fill="#38bdf8" font-size="9">GOOGLE</text>
  <text x="345" y="200" text-anchor="middle" fill="#64748b" font-size="8">12 tools</text>
  <text x="345" y="212" text-anchor="middle" fill="#64748b" font-size="8">Docs + Drive</text>

  <rect x="390" y="168" width="80" height="50" rx="4" fill="#1e293b"/>
  <text x="430" y="186" text-anchor="middle" fill="#38bdf8" font-size="9">NOTION</text>
  <text x="430" y="200" text-anchor="middle" fill="#64748b" font-size="8">10 tools</text>
  <text x="430" y="212" text-anchor="middle" fill="#64748b" font-size="8">Pages + DBs</text>

  <rect x="475" y="168" width="80" height="50" rx="4" fill="#1e293b"/>
  <text x="515" y="186" text-anchor="middle" fill="#38bdf8" font-size="9">MICROSOFT</text>
  <text x="515" y="200" text-anchor="middle" fill="#64748b" font-size="8">7 tools</text>
  <text x="515" y="212" text-anchor="middle" fill="#64748b" font-size="8">OneDrive</text>

  <rect x="305" y="225" width="80" height="50" rx="4" fill="#1e293b"/>
  <text x="345" y="243" text-anchor="middle" fill="#a78bfa" font-size="9">CRUD</text>
  <text x="345" y="257" text-anchor="middle" fill="#64748b" font-size="8">create, read</text>
  <text x="345" y="269" text-anchor="middle" fill="#64748b" font-size="8">update, delete</text>

  <rect x="390" y="225" width="80" height="50" rx="4" fill="#1e293b"/>
  <text x="430" y="243" text-anchor="middle" fill="#a78bfa" font-size="9">SEARCH</text>
  <text x="430" y="257" text-anchor="middle" fill="#64748b" font-size="8">full-text</text>
  <text x="430" y="269" text-anchor="middle" fill="#64748b" font-size="8">database query</text>

  <rect x="475" y="225" width="80" height="50" rx="4" fill="#1e293b"/>
  <text x="515" y="243" text-anchor="middle" fill="#a78bfa" font-size="9">COLLAB</text>
  <text x="515" y="257" text-anchor="middle" fill="#64748b" font-size="8">comments</text>
  <text x="515" y="269" text-anchor="middle" fill="#64748b" font-size="8">share, export</text>

  <rect x="305" y="282" width="250" height="20" rx="4" fill="#1e293b"/>
  <text x="430" y="296" text-anchor="middle" fill="#94a3b8" font-size="9">tracing · env-filter · adk-mcp-sdk · feature-flagged backends</text>

  <!-- Arrow: Server → Backends -->
  <line x1="570" y1="120" x2="640" y2="100" stroke="#2563eb" stroke-width="2"/>
  <polygon points="640,95 650,100 640,105" fill="#2563eb"/>
  <line x1="570" y1="150" x2="640" y2="180" stroke="#e01e5a" stroke-width="2"/>
  <polygon points="640,175 650,180 640,185" fill="#e01e5a"/>
  <line x1="570" y1="200" x2="640" y2="260" stroke="#0078d4" stroke-width="2"/>
  <polygon points="640,255 650,260 640,265" fill="#0078d4"/>
  <text x="605" y="90" text-anchor="middle" fill="#2563eb" font-size="9">OAuth2</text>
  <text x="605" y="175" text-anchor="middle" fill="#e01e5a" font-size="9">API Key</text>
  <text x="605" y="255" text-anchor="middle" fill="#0078d4" font-size="9">Graph Token</text>

  <!-- Backends (right) -->
  <rect x="650" y="60" width="220" height="70" rx="8" fill="url(#docGrad)" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="760" y="82" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="bold">Google Docs / Drive</text>
  <rect x="665" y="95" width="190" height="24" rx="4" fill="#1e293b"/>
  <text x="760" y="112" text-anchor="middle" fill="#f1f5f9" font-size="10">docs.googleapis.com · drive/v3</text>

  <rect x="650" y="145" width="220" height="70" rx="8" fill="#1e293b" stroke="#e01e5a" stroke-width="1.5"/>
  <text x="760" y="167" text-anchor="middle" fill="#e01e5a" font-size="12" font-weight="bold">Notion API</text>
  <rect x="665" y="180" width="190" height="24" rx="4" fill="#1e293b"/>
  <text x="760" y="197" text-anchor="middle" fill="#f1f5f9" font-size="10">api.notion.com/v1</text>

  <rect x="650" y="230" width="220" height="70" rx="8" fill="#1e293b" stroke="#0078d4" stroke-width="1.5"/>
  <text x="760" y="252" text-anchor="middle" fill="#0078d4" font-size="12" font-weight="bold">Microsoft OneDrive</text>
  <rect x="665" y="265" width="190" height="24" rx="4" fill="#1e293b"/>
  <text x="760" y="282" text-anchor="middle" fill="#f1f5f9" font-size="10">graph.microsoft.com/v1.0</text>

  <!-- Registry (bottom) -->
  <rect x="290" y="330" width="280" height="45" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
  <text x="430" y="350" text-anchor="middle" fill="#6366f1" font-size="10">ADK-RUST ENTERPRISE REGISTRY</text>
  <text x="430" y="366" text-anchor="middle" fill="#64748b" font-size="9">auto-onboarding · health monitoring · risk governance</text>

  <!-- Arrow: Server → Registry -->
  <line x1="430" y1="310" x2="430" y2="330" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Footer -->
  <text x="450" y="420" text-anchor="middle" fill="#475569" font-size="10">mcp-document v2.0.0 · 29 tools · reqwest + serde · Google OAuth + Notion API Key + MS Graph</text>
</svg>
