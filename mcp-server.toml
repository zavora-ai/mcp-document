server_id = "mcp_document"
display_name = "Document"
version = "2.0.0"
domain = "productivity"
sdk_version = "0.1.0"
risk_level = "medium"
writes_allowed = "gated"
transports = ["stdio"]
credentials = ["vault://google-docs-token", "vault://notion-api-key", "vault://ms-graph-token"]
governance_gates = []
environments = ["development", "staging", "production"]

# ─── Google Docs / Drive (12) ─────────────────────────────────────────────────

[[tools]]
name = "google_list_docs"
description = "List Google Docs documents"
risk_class = "read_only"
requires_approval = false
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_search_docs"
description = "Search Google Docs by content"
risk_class = "read_only"
requires_approval = false
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_get_doc"
description = "Get Google Doc metadata and structure"
risk_class = "read_only"
requires_approval = false
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_get_text"
description = "Get Google Doc as plain text"
risk_class = "read_only"
requires_approval = false
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_create_doc"
description = "Create a new Google Doc"
risk_class = "internal_write"
requires_approval = true
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_insert_text"
description = "Insert text into a Google Doc at a position"
risk_class = "internal_write"
requires_approval = true
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_replace_text"
description = "Find and replace text in a Google Doc"
risk_class = "internal_write"
requires_approval = true
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_export_doc"
description = "Export Google Doc as text/plain, text/html, or application/pdf"
risk_class = "read_only"
requires_approval = false
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_list_comments"
description = "List comments on a Google Doc"
risk_class = "read_only"
requires_approval = false
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_add_comment"
description = "Add a comment to a Google Doc"
risk_class = "internal_write"
requires_approval = false
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_share_doc"
description = "Share a Google Doc with a user"
risk_class = "external_write"
requires_approval = true
credential_bindings = ["vault://google-docs-token"]

[[tools]]
name = "google_delete_doc"
description = "Delete a Google Doc"
risk_class = "external_write"
requires_approval = true
credential_bindings = ["vault://google-docs-token"]

